<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Courier Management System</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Embedded CSS -->
  <style>
    h1 {
      text-align: center;
      color: darkblue;
    }

    .map-box {
      border: 3px solid black;
      padding: 10px;
      margin: 20px auto;
      width: 700px;
      background-color: #f2f2f2;
    }

    iframe {
      border: 2px solid #444;
    }
  </style>
</head>

<body>

  <h1>Online Courier Management System</h1>

  <!-- Inline CSS -->
  <p style="text-align:center; font-size:18px; color:green;">
    Track your courier branches across Chennai easily!
  </p>

  <!-- Navigation Links -->
  <div class="nav">
    <a href="#map">Branch Map</a>
    <a href="https://www.indiapost.gov.in" target="_blank">India Post</a>
    <a href="https://www.dtdc.com" target="_blank">DTDC</a>
  </div>

  <!-- MAP WITH HOTSPOTS -->
  <div class="map-box" id="map">

    <h2>Courier Branch Locations</h2>

    <img src="chennai-map.jpg" usemap="#couriermap" width="650">

    <map name="couriermap">

      <!-- Hotspot 1 -->
      <area shape="rect" coords="120,150,200,220"
            href="https://www.google.com/maps"
            target="frameBox"
            alt="T Nagar Branch">

      <!-- Hotspot 2 -->
      <area shape="rect" coords="300,200,380,270"
            href="https://www.google.com/maps"
            target="frameBox"
            alt="Anna Nagar Branch">

      <!-- Hotspot 3 -->
      <area shape="rect" coords="450,250,530,320"
            href="https://www.google.com/maps"
            target="frameBox"
            alt="Velachery Branch">

    </map>

  </div>

  <!-- FRAME SECTION -->
  <h2 style="text-align:center;">Branch Info Frame</h2>

  <center>
    <iframe
      name="frameBox"
      src="https://www.indiapost.gov.in"
      width="700"
      height="300">
    </iframe>
  </center>

</body>
</html>
